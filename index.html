<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.S Manisa Taşıyıcılar Kooperatifi - Fotoğraf Yükleme Sistemi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1e3a5f;
            --primary-light: #2d5a8c;
            --accent: #d4af37;
            --danger: #e74c3c;
            --success: #27ae60;
            --bg-dark: #0f2027;
            --bg-light: #f8f9fa;
            --text-primary: #1e3a5f;
            --text-light: #7f8c8d;
            --border: #e1e8ed;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a3f52 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 50px;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 60px;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        h1 {
            font-size: 2.5em;
            color: white;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .tagline {
            color: var(--accent);
            font-size: 1.1em;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #b8c5d6;
            font-size: 0.95em;
        }

        /* Main Content */
        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card:nth-child(2) {
            animation-delay: 0.1s;
        }

        .card h2 {
            font-size: 1.5em;
            color: var(--primary);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card h2 span {
            font-size: 1.3em;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.95em;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: linear-gradient(white, white) padding-box,
                linear-gradient(135deg, var(--primary), var(--primary-light)) border-box;
            box-shadow: 0 0 0 3px rgba(30, 58, 95, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* File Upload */
        .file-upload-zone {
            border: 3px dashed var(--primary);
            border-radius: 10px;
            padding: 35px 20px;
            text-align: center;
            background: linear-gradient(135deg, rgba(30, 58, 95, 0.02) 0%, rgba(212, 175, 55, 0.02) 100%);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .file-upload-zone:hover {
            border-color: var(--accent);
            background: linear-gradient(135deg, rgba(30, 58, 95, 0.05) 0%, rgba(212, 175, 55, 0.05) 100%);
            transform: translateY(-2px);
        }

        .file-upload-zone.dragover {
            border-color: var(--success);
            background: linear-gradient(135deg, rgba(39, 174, 96, 0.1) 0%, rgba(212, 175, 55, 0.05) 100%);
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 12px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }
        }

        .file-upload-zone p {
            color: var(--text-primary);
            font-weight: 500;
            margin-bottom: 8px;
        }

        .file-upload-zone small {
            color: var(--text-light);
            display: block;
        }

        #imageInput {
            width: 0.1px;
            height: 0.1px;
            opacity: 0;
            overflow: hidden;
            position: absolute;
            z-index: -1;
        }

        .preview {
            margin-top: 20px;
            text-align: center;
        }

        .preview img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
            border: 3px solid var(--accent);
        }

        .preview-info {
            margin-top: 15px;
            padding: 12px;
            background: var(--bg-light);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9em;
        }

        /* Buttons */
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        @media (max-width: 600px) {
            .button-group {
                grid-template-columns: 1fr;
            }
        }

        button {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(30, 58, 95, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(30, 58, 95, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: var(--bg-light);
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-secondary:hover {
            background: var(--primary);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Status Messages */
        .status-message {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status-message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(30, 58, 95, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spinner.active {
            display: block;
        }

        /* Info Box */
        .info-box {
            background: linear-gradient(135deg, rgba(30, 58, 95, 0.05) 0%, rgba(212, 175, 55, 0.05) 100%);
            border-left: 4px solid var(--accent);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .info-box h3 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 1em;
        }

        .info-box p {
            color: var(--text-light);
            font-size: 0.9em;
            line-height: 1.6;
        }

        /* Footer */
        footer {
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo-section">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRO-j0TTkyCLJuyfHUXKe2PRasN9Y9V6Jw2cA&s"
                    alt="Manisa Taşıyıcılar Kooperatifi Logo"
                    style="max-width: 120px; margin-bottom: 20px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));">
                <div class="tagline">MANİSA TAŞIYICILAR KOOPERATİFİ</div>
                <h1>Fotoğraf Portalı</h1>
                <p class="subtitle">Fotoğrafları otomatik olarak PDF'e dönüştürüp gönder</p>
            </div>
        </header>

        <div class="content">
            <!-- Upload Section -->
            <div class="card">
                <h2><span>📸</span> Fotoğraf Yükle</h2>

                <div class="form-group">
                    <label for="imageInput"
                        style="font-weight: 600; margin-bottom: 8px; display: block; color: var(--text-primary);">Fotoğraf
                        Seç</label>
                    <label class="file-upload-zone" id="uploadZone" for="imageInput" style="display: block;">
                        <div class="upload-icon">📁</div>
                        <p>Fotoğraf dosyasını sürükle ve bırak</p>
                        <small>veya tıklayarak dosya seç (PNG, JPG, JPEG)</small>
                    </label>
                    <input type="file" id="imageInput" accept="image/png, image/jpeg, image/jpg, image/webp" multiple>
                    <div class="preview" id="preview"></div>
                </div>

                <div id="uploadStatus" class="status-message"></div>
                <div class="spinner" id="spinner"></div>
            </div>

            <!-- Email Section -->
            <div class="card">
                <h2><span>✉️</span> E-mail Bilgileri</h2>

                <div class="form-group">
                    <label for="senderName">Gönderen Adı</label>
                    <input type="text" id="senderName" placeholder="Adınız Soyadınız" required>
                </div>

                <div class="form-group">
                    <label for="senderEmail">E-mail Adresiniz</label>
                    <input type="email" id="senderEmail" placeholder="example@email.com" required>
                </div>

                <div class="form-group">
                    <label for="subject">Konu</label>
                    <input type="text" id="subject" placeholder="E-mail konusu"
                        value="Manisa Kooperatifi - Fotoğraf Gönderimi" required>
                </div>

                <div class="form-group">
                    <label for="message">Mesaj</label>
                    <textarea id="message" placeholder="Ek notlarınız..."></textarea>
                </div>

                <div id="emailStatus" class="status-message"></div>

                <div class="button-group">
                    <button class="btn-primary" onclick="sendEmailWithPDF()" id="sendBtn">
                        📬 PDF GÖNDER
                    </button>
                    <button class="btn-secondary" onclick="resetForm()">Temizle</button>
                </div>
            </div>
        </div>

        <footer>
            <p><span class="footer-accent">Manisa Taşıyıcılar Kooperatifi</span></p>
            <p>📧 banko2@manisakoop.com</p>
            <p style="margin-top: 15px; font-size: 0.8em;">Bu portal fotoğrafları otomatik olarak PDF'e dönüştürüp
                belirtilen e-mail adresine gönderir.</p>
        </footer>
    </div>

    <script>
        // EmailJS Configuration - GÜNCELLEMESİ GEREKLI
        const EMAILJS_PUBLIC_KEY = 'V_XVyFel-jRXgPpgf';
        const EMAILJS_SERVICE_ID = 'service_qfvxgvk';
        const EMAILJS_TEMPLATE_ID = 'template_4dbcdyl';
        const RECIPIENT_EMAIL = 'banko2@manisakoop.com';

        // Başlatma
        emailjs.init(EMAILJS_PUBLIC_KEY);

        let selectedImages = [];
        const uploadZone = document.getElementById('uploadZone');
        const imageInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');

        // Dosya seçimi
        // Dosya seçimi native label ile çözüldü, JS tarafındaki click dinleyicisine gerek yok:
        // uploadZone.addEventListener('click', () => imageInput.click());

        imageInput.addEventListener('change', handleImageSelect);

        // Sürükle-Bırak Desteği
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                imageInput.files = files;
                handleImageSelect();
            }
        });

        function handleImageSelect() {
            const files = imageInput.files;
            if (!files || files.length === 0) return;

            selectedImages = [];
            preview.innerHTML = '';

            Array.from(files).forEach(file => {
                if (!file.type.startsWith('image/')) {
                    showMessage('uploadStatus', 'Lütfen sadece geçerli resim dosyaları seçin!', 'error');
                    return;
                }

                const reader = new FileReader();
                reader.onload = (e) => {
                    selectedImages.push(e.target.result);
                    
                    const div = document.createElement('div');
                    div.style.marginBottom = '15px';
                    div.innerHTML = `
                        <img src="${e.target.result}" alt="Önizleme" style="max-width: 100%; max-height: 300px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15); border: 3px solid var(--accent); display: block; margin: 0 auto;">
                        <div class="preview-info" style="margin-top: 10px; font-size: 0.9em; background: var(--bg-light); padding: 8px; border-radius: 6px; color: var(--text-primary);">
                            ✓ ${file.name} | ${(file.size / 1024).toFixed(2)} KB
                        </div>
                    `;
                    preview.appendChild(div);
                };
                reader.readAsDataURL(file);
            });
            showMessage('uploadStatus', '✓ Fotoğraflar başarıyla yüklendi!', 'success');
        }

        function sendEmailWithPDF() {
            // Validasyon
            if (selectedImages.length === 0) {
                showMessage('emailStatus', 'Lütfen önce en az bir fotoğraf yükleyin!', 'error');
                return;
            }

            const senderName = document.getElementById('senderName').value.trim();
            const senderEmail = document.getElementById('senderEmail').value.trim();
            const subject = document.getElementById('subject').value.trim();
            const message = document.getElementById('message').value.trim();

            if (!senderName || !senderEmail || !subject) {
                showMessage('emailStatus', 'Lütfen tüm zorunlu alanları doldurun!', 'error');
                return;
            }

            // Kontrol
            if (EMAILJS_PUBLIC_KEY === 'YOUR_PUBLIC_KEY') {
                showMessage('emailStatus', 'Hata: EmailJS anahtarları yapılandırılmamış! Kurulum talimatlarına bakın.', 'error');
                return;
            }

            // İşlem başlat
            toggleLoading(true);
            showMessage('emailStatus', 'Fotoğraf PDF'e dönüştürülüyor...', 'info');

            // PDF oluştur
            setTimeout(() => {
                createAndSendPDF(senderName, senderEmail, subject, message);
            }, 500);
        }

        function createAndSendPDF(senderName, senderEmail, subject, message) {
            try {
                // PDF İçeriği Oluştur
                const element = document.createElement('div');
                element.style.width = '800px';
                element.style.padding = '40px';
                element.style.backgroundColor = 'white';
                let imagesHtml = '';
                selectedImages.forEach(imgSrc => {
                    imagesHtml += `<img src="${imgSrc}" style="max-width: 100%; border-radius: 8px; border: 3px solid #d4af37; margin-bottom: 30px; display: block; margin-left: auto; margin-right: auto;">`;
                });

                element.innerHTML = `
                    <div style="text-align: center; margin-bottom: 30px;">
                        <h1 style="color: #1e3a5f; margin: 0;">MANİSA TAŞIYICILAR KOOPERATİFİ</h1>
                        <p style="color: #d4af37; font-size: 16px; margin: 10px 0 0 0;">Fotoğraf Belgesi</p>
                    </div>
                    
                    <div style="border-top: 2px solid #1e3a5f; padding-top: 30px;">
                        ${imagesHtml}
                        
                        <div style="background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 30px;">
                            <p style="margin: 10px 0;"><strong>Gönderici:</strong> ${senderName}</p>
                            <p style="margin: 10px 0;"><strong>E-mail:</strong> ${senderEmail}</p>
                            <p style="margin: 10px 0;"><strong>Konu:</strong> ${subject}</p>
                            <p style="margin: 10px 0;"><strong>Tarih:</strong> ${new Date().toLocaleString('tr-TR')}</p>
                        </div>
                        
                        ${message ? `<div style="margin-top: 20px; padding: 15px; background: #fff3cd; border-left: 4px solid #d4af37; border-radius: 4px;">
                            <p><strong>Notlar:</strong></p>
                            <p style="white-space: pre-wrap; margin: 10px 0;">${message}</p>
                        </div>` : ''}
                        
                        <div style="margin-top: 40px; text-align: center; color: #7f8c8d; font-size: 12px; border-top: 1px solid #e1e8ed; padding-top: 20px;">
                            <p>Bu belge otomatik olarak oluşturulmuştur.</p>
                            <p>banko2@manisakoop.com</p>
                        </div>
                    </div>
                `;

                document.body.appendChild(element);

                // PDF'e Dönüştür
                const opt = {
                    margin: 10,
                    filename: `Manisa_Koop_Fotograf_${Date.now()}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2 },
                    jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
                };

                html2pdf().set(opt).from(element).toPdf().output('datauristring').then((pdfDataUri) => {
                    document.body.removeChild(element);

                    // E-mail Gönder
                    const templateParams = {
                        to_email: RECIPIENT_EMAIL,
                        sender_name: senderName,
                        sender_email: senderEmail,
                        subject: subject,
                        message: message || '(Ek not yok)',
                        pdf_url: pdfDataUri
                    };

                    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams)
                        .then(response => {
                            toggleLoading(false);
                            showMessage('emailStatus', '✓ Fotoğraf başarıyla PDF olarak gönderildi! (banko2@manisakoop.com)', 'success');
                            resetForm();
                        })
                        .catch(error => {
                            console.error('EmailJS Error:', error);
                            toggleLoading(false);
                            showMessage('emailStatus', 'E-mail gönderirken hata oluştu. Lütfen konsolu kontrol edin.', 'error');
                        });
                });
            } catch (error) {
                console.error('PDF Error:', error);
                toggleLoading(false);
                showMessage('emailStatus', 'PDF oluştururken hata oluştu: ' + error.message, 'error');
            }
        }

        function toggleLoading(show) {
            document.getElementById('spinner').classList.toggle('active', show);
            document.getElementById('sendBtn').disabled = show;
        }

        function showMessage(elementId, text, type) {
            const element = document.getElementById(elementId);
            element.textContent = text;
            element.className = `status-message ${type}`;
            element.style.display = 'block';
        }

        function resetForm() {
            document.getElementById('senderName').value = '';
            document.getElementById('senderEmail').value = '';
            document.getElementById('subject').value = 'Manisa Kooperatifi - Fotoğraf Gönderimi';
            document.getElementById('message').value = '';
            selectedImages = [];
            preview.innerHTML = '';
            imageInput.value = '';
            document.getElementById('emailStatus').style.display = 'none';
            document.getElementById('uploadStatus').style.display = 'none';
        }
    </script>
</body>

</html>
